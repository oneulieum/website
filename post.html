<script src="posts/posts.js"></script>
<script>
const CAT_LABEL = { trend: '공공구매 동향', se: '사회연대경제', edu: '교육·행사' };
const fmtDate = (d) => d.replaceAll('-', '. ');

(() => {
  const el = document.getElementById('article');
  try {
    const id = new URLSearchParams(location.search).get('id');
    const posts = (window.POSTS_DATA && window.POSTS_DATA.posts) || [];
    const post = posts.find((p) => p.id === id) || posts[0];
    if (!post) throw new Error('no post');
    document.title = post.title + ' | 오늘이음 인사이트';
    el.innerHTML =
      '<span class="cat">' + (CAT_LABEL[post.category] || post.category) + '</span>' +
      '<h1>' + post.title + '</h1>' +
      '<div class="meta">' + fmtDate(post.date) + ' · 오늘이음 주식회사</div>' +
      '<div class="body">' + marked.parse(post.body) + '</div>' +
      '<p style="margin-top:48px"><a href="blog.html" style="color:var(--blue);font-weight:700">← 목록으로 돌아가기</a></p>';
  } catch (e) {
    el.innerHTML = '<h1>게시글을 찾을 수 없습니다</h1><p><a href="blog.html" style="color:var(--blue);font-weight:700">← 목록으로 돌아가기</a></p>';
  }
})();
</script>
